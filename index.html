<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriTruth AI - Fake News Detection</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: black;
        }
        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simplified Lucide Icon Component for CDN usage
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const StatusBadge = ({ score }) => {
            const isReal = score > 60;
            const isFake = score < 40;
            
            const config = isReal 
                ? { icon: "check-circle-2", color: "bg-emerald-500/20 text-emerald-400 border-emerald-500/30", text: "Likely Real" }
                : isFake 
                ? { icon: "x-circle", color: "bg-rose-500/20 text-rose-400 border-rose-500/30", text: "Highly Suspicious" }
                : { icon: "alert-circle", color: "bg-amber-500/20 text-amber-400 border-amber-500/30", text: "Inconclusive" };

            return (
                <div className={`flex items-center gap-2 px-3 py-1 rounded-full border text-xs font-semibold ${config.color}`}>
                    <Icon name={config.icon} className="w-4 h-4" />
                    {config.text}
                </div>
            );
        };

        const AnalysisCard = ({ title, value, subtext, icon, colorClass }) => (
            <div className="p-5 rounded-2xl bg-zinc-900/50 border border-zinc-800 flex flex-col gap-3 hover:border-zinc-700 transition-colors">
                <div className="flex justify-between items-start">
                    <div className={`p-2 rounded-lg ${colorClass}`}>
                        <Icon name={icon} className="w-5 h-5 text-white" />
                    </div>
                    <span className="text-zinc-500 text-xs font-medium uppercase tracking-wider">{title}</span>
                </div>
                <div className="mt-2">
                    <div className="text-2xl font-bold text-white">{value}</div>
                    <div className="text-zinc-500 text-xs mt-1">{subtext}</div>
                </div>
            </div>
        );

        function App() {
            const [inputText, setInputText] = useState("");
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState(null);
            const [history, setHistory] = useState([
                { id: 1, text: "NASA confirms the moon is actually made of blue cheese...", status: "Fake", date: "2 mins ago" },
                { id: 2, text: "New Federal Reserve rate hike announced for Q3...", status: "Real", date: "1 hour ago" }
            ]);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [result, isAnalyzing]);

            const handleAnalyze = () => {
                if (!inputText.trim()) return;
                
                setIsAnalyzing(true);
                setResult(null);

                setTimeout(() => {
                    const mockResult = {
                        credibility: Math.floor(Math.random() * 100),
                        sentiment: "Highly Emotional",
                        readability: "8th Grade Level",
                        sourceRating: "Unverified",
                        flags: ["Hyperbolic Language", "Lack of Peer Citation", "Anonymous Source"]
                    };
                    setResult(mockResult);
                    setIsAnalyzing(false);
                    setHistory(prev => [{ 
                        id: Date.now(), 
                        text: inputText.substring(0, 50) + "...", 
                        status: mockResult.credibility > 50 ? "Real" : "Fake", 
                        date: "Just now" 
                    }, ...prev]);
                }, 2000);
            };

            return (
                <div className="min-h-screen bg-black text-zinc-100 font-sans selection:bg-indigo-500/30">
                    <nav className="fixed top-0 w-full z-50 border-b border-zinc-800 bg-black/80 backdrop-blur-xl">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                                    <Icon name="shield-check" className="w-5 h-5 text-white" />
                                </div>
                                <span className="text-xl font-bold tracking-tight">VeriTruth<span className="text-indigo-500">AI</span></span>
                            </div>
                            <div className="hidden md:flex items-center gap-8 text-sm font-medium text-zinc-400">
                                <a href="#" className="hover:text-white transition-colors">How it works</a>
                                <a href="#" className="hover:text-white transition-colors">API Docs</a>
                                <button className="px-4 py-2 bg-zinc-100 text-black rounded-full hover:bg-white transition-all active:scale-95">
                                    Get Started
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="pt-24 pb-12 px-4 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-8 space-y-8">
                            <div className="space-y-4">
                                <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight text-white">
                                    Verify the <span className="bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">Truth</span> Behind the Headlines.
                                </h1>
                                <p className="text-zinc-400 text-lg max-w-2xl leading-relaxed">
                                    Paste a news article or a social media claim. Our multi-modal AI cross-references 
                                    linguistic patterns and fact databases in seconds.
                                </p>
                            </div>

                            <div className="relative group">
                                <div className="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-cyan-500 rounded-2xl blur opacity-15 group-hover:opacity-25 transition duration-1000"></div>
                                <div className="relative bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl">
                                    <textarea 
                                        className="w-full h-48 bg-transparent border-none text-zinc-100 placeholder:text-zinc-600 focus:ring-0 resize-none text-lg"
                                        placeholder="Paste news text or URL here..."
                                        value={inputText}
                                        onChange={(e) => setInputText(e.target.value)}
                                    />
                                    <div className="flex flex-col sm:flex-row justify-between items-center mt-4 pt-4 border-t border-zinc-800 gap-4">
                                        <div className="flex items-center gap-4 text-xs text-zinc-500">
                                            <span className="flex items-center gap-1"><Icon name="search" className="w-3 h-3" /> Auto-search Active</span>
                                            <span className="flex items-center gap-1"><Icon name="brain-circuit" className="w-3 h-3" /> BERT Model v4.2</span>
                                        </div>
                                        <button 
                                            onClick={handleAnalyze}
                                            disabled={isAnalyzing || !inputText.trim()}
                                            className="w-full sm:w-auto flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 disabled:bg-zinc-800 disabled:text-zinc-500 text-white px-8 py-3 rounded-xl font-bold transition-all active:scale-95"
                                        >
                                            {isAnalyzing ? "Analyzing Narrative..." : "Verify Claim"}
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {result && !isAnalyzing && (
                                <div className="space-y-6">
                                    <div className="flex items-center justify-between">
                                        <h3 className="text-xl font-bold flex items-center gap-2">
                                            <Icon name="bar-chart-3" className="w-5 h-5 text-indigo-400" />
                                            Analysis Breakdown
                                        </h3>
                                        <StatusBadge score={result.credibility} />
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <AnalysisCard title="Credibility" value={`${result.credibility}%`} subtext="AI Confidence Score" icon="shield-check" colorClass="bg-indigo-600" />
                                        <AnalysisCard title="Tone" value={result.sentiment} subtext="Emotional complexity" icon="alert-triangle" colorClass="bg-amber-600" />
                                        <AnalysisCard title="Source" value={result.sourceRating} subtext="Domain reputation" icon="newspaper" colorClass="bg-cyan-600" />
                                        <AnalysisCard title="Complexity" value={result.readability} subtext="Linguistic Level" icon="info" colorClass="bg-purple-600" />
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="lg:col-span-4 space-y-6">
                            <div className="p-6 rounded-2xl bg-zinc-900/40 border border-zinc-800">
                                <h3 className="text-lg font-bold flex items-center gap-2 mb-4">
                                    <Icon name="history" className="w-5 h-5 text-zinc-500" />
                                    Recent Activity
                                </h3>
                                <div className="space-y-4">
                                    {history.map((item) => (
                                        <div key={item.id} className="p-3 rounded-xl bg-zinc-900/60 border border-zinc-800">
                                            <div className="flex justify-between items-start mb-1">
                                                <span className={`text-[10px] font-bold uppercase ${item.status === 'Real' ? 'text-emerald-500' : 'text-rose-500'}`}>{item.status}</span>
                                                <span className="text-[10px] text-zinc-600">{item.date}</span>
                                            </div>
                                            <p className="text-sm text-zinc-400 line-clamp-1">"{item.text}"</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
